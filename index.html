<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Forge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1012;
      font-family: 'Inter', Arial, sans-serif;
      color: #e6e6e6;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: -1px;
      color: #ffffff;
    }

    h1 span {
      color: #e8620a;
    }

    p {
      margin-top: 16px;
      font-size: 1.1rem;
      color: #888;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>The <span>Forge</span></h1>
    <p>Fitness tracker &mdash; coming soon</p>
  </div>
</body>
</html>
